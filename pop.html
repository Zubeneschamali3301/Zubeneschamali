<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Virus</title>
<link rel="stylesheet" href="style.css">

<style>
  body {
    background: black;
    color: white;
    font-family: monospace;
    overflow: hidden;
    text-align: center;
  }

  .contenedor {
    margin-top: 20vh;
    transition: transform 0.2s ease, opacity 0.2s ease;
  }

  .glitch {
    font-size: 2.5em;
    animation: flicker 0.2s infinite;
  }

  @keyframes flicker {
    0% { opacity: 1; }
    25% { opacity: 0.3; }
    50% { opacity: 1; }
    75% { opacity: 0.2; }
    100% { opacity: 1; }
  }

  /* efecto “pop” */
  .pop {
    transform: scale(1.6) rotate(5deg);
    opacity: 0;
    transition: all 0.4s ease;
  }

  /* flash blanco */
  .flash {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:white;
    opacity:0;
    pointer-events:none;
  }

  .activo {
    animation: flash 0.3s ease;
  }

  @keyframes flash {
    0% { opacity: 0; }
    50% { opacity: 1; }
    100% { opacity: 0; }
  }

</style>
</head>

<body>
<div id="fragments" class="fragment-container"></div>
<div class="flash" id="flash"></div>

<div class="contenedor" id="box">
  <h1 class="glitch">⚠ SISTEMA INESTABLE ⚠</h1>
  <p>Última transmisión en curso...</p>
</div>

<script>
function crearFragmentos() {
  const container = document.getElementById("fragments");

  for (let i = 0; i < 36; i++) {
    const div = document.createElement("div");
    div.classList.add("fragment");

    // movimiento aleatorio de cada trozo
    const x = (Math.random() - 0.5) * 800 + "px";
    const y = (Math.random() - 0.5) * 800 + "px";

    div.style.setProperty("--x", x);
    div.style.setProperty("--y", y);

    container.appendChild(div);
  }
}

// 💥 disparar fragmentación en el momento clave
setTimeout(() => {
  crearFragmentos();

  // opcional: sonido explosión
  document.getElementById("boom").play();

}, 3000);
let box = document.getElementById("box");
let flash = document.getElementById("flash");

// 💥 fase 1: inestabilidad
setTimeout(() => {
  box.style.transform = "scale(1.1)";
}, 1000);

// 💥 fase 2: glitch fuerte
setTimeout(() => {
  box.style.transform = "scale(1.3)";
}, 2000);

// 💥 fase 3: “POP” final
setTimeout(() => {

  // flash blanco
  flash.classList.add("activo");

  // explosión visual
  box.classList.add("pop");

}, 3000);

// 🚀 redirección final
setTimeout(() => {
  window.location.href = "cumpleaños.html"; // destino final
}, 3800);

</script>

</body>
</html>
