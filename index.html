<!DOCTYPE html>
<html>
<head>
<title>ACCESS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>ACCESS GRANTED</h1>
<p class="blink">Subjeto identificado...</p>
<p>Misión cargada.</p>
<p>Sé paciente.</p>
<p class="blink">_</p>
<div class="container">
  <h2 id="contador"></h2>
</div>
<script>
  const fechaDestino = new Date("2026-05-05T14:45:00").getTime(); // cámbiala
  const urlFinal = "root.html"; // 👉 tu página final

  const x = setInterval(function () {

    const ahora = new Date().getTime();
    const distancia = fechaDestino - ahora;

    const dias = Math.floor(distancia / (1000 * 60 * 60 * 24));
    const horas = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutos = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
    const segundos = Math.floor((distancia % (1000 * 60)) / 1000);

    document.getElementById("contador").innerHTML =
      dias + "d " + horas + "h " + minutos + "m " + segundos + "s";

    // 🔥 CUANDO LLEGA A CERO
    if (distancia <= 0) {
      clearInterval(x);

      document.getElementById("contador").innerHTML = "MISIÓN ACTIVADA";

      // efecto dramático antes de redirigir
      document.body.innerHTML = `
        <div style="color:white; text-align:center; padding-top:100px; font-family:monospace;">
          <h1>🚨 ACCESO COMPLETADO 🚨</h1>
          <p>Redirigiendo al destino...</p>
        </div>
      `;

      setTimeout(() => {
        window.location.href = urlFinal;
      }, 3000);
    }

  }, 1000);
</script>
<br>
<br>
<p>Zubeneschamali 3301</p>
</body>
</html>
